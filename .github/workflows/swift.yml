name: macOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (Xcode project)
        run: |
          set -o pipefail
          xcodebuild \
            -project proximityLock/proximityLock.xcodeproj \
            -scheme proximityLock \
            -configuration Debug \
            -sdk macosx \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
